<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>inv2digikey</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .fade-in { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .card { transition: box-shadow 0.15s; }
    .card:active { box-shadow: 0 0 0 2px #2563eb; }
    input:focus, textarea:focus { outline: none; box-shadow: 0 0 0 2px #2563eb; }
    #scanner-video { width: 100%; display: block; border-radius: 0.75rem; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div id="app"></div>

<script type="module">
// ── Barcode detector: native API (Chrome/Android) → ZXing WASM fallback ───────
let _detector = null;

async function getDetector() {
  if (_detector) return _detector;

  const fmts = ['data_matrix','qr_code','code_128','code_39','ean_13','ean_8','upc_a','upc_e','pdf417'];

  if ('BarcodeDetector' in window) {
    try {
      const supported = await window.BarcodeDetector.getSupportedFormats();
      const use = fmts.filter(f => supported.includes(f));
      _detector = new window.BarcodeDetector({ formats: use.length ? use : fmts });
      return _detector;
    } catch (_) { /* fall through */ }
  }

  // Fallback: ZXing WASM (correct main entry — no /full subpath)
  const { readBarcodes } = await import('https://esm.sh/@sec-ant/zxing-wasm@1.1.3');
  _detector = {
    detect: async video => {
      const canvas = new OffscreenCanvas(video.videoWidth, video.videoHeight);
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(video, 0, 0);
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const results = await readBarcodes(imgData, {
        formats: ['DataMatrix','QRCode','Code128','Code39','EAN-13','EAN-8','UPC-A','PDF417'],
        tryHarder: true, tryRotate: true, tryInvert: true,
      });
      return results.map(r => ({ rawValue: r.text }));
    },
  };
  return _detector;
}

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  token: localStorage.getItem('inv_token') || '',
  view: 'inventory',
  components: [],
  search: '',
  current: null,
  scanned: null,
  scannerRunning: false,
  scannerStream: null,
  scannerTimer: null,
  hasUsers: false,
};

// ── API ───────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (S.token) opts.headers['Authorization'] = `Bearer ${S.token}`;
  if (body !== undefined) {
    if (method === 'POST' && path === '/api/auth/login') {
      opts.headers['Content-Type'] = 'application/x-www-form-urlencoded';
      opts.body = `username=${encodeURIComponent(body.username)}&password=${encodeURIComponent(body.password)}`;
    } else {
      opts.body = JSON.stringify(body);
    }
  }
  const res = await fetch(path, opts);
  if (res.status === 204) return null;
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
  return data;
}

// ── Barcode parser ────────────────────────────────────────────────────────────
function parseBarcode(raw) {
  const GS  = String.fromCharCode(29);
  const RS  = String.fromCharCode(30);
  const EOT = String.fromCharCode(4);
  const strip = s => s.replace(new RegExp(EOT, 'g'), '').trim();

  const result = { digikey_pn: '', manufacturer_pn: '', manufacturer: '', description: '', quantity: 0, raw_barcode: raw };
  const isDigiKey = raw.includes('[)>') || raw.includes(GS) || raw.includes(RS);

  if (isDigiKey) {
    const norm = raw.replace(new RegExp(RS, 'g'), GS).replace(/\r?\n/g, GS);
    norm.split(GS).forEach(field => {
      const f = strip(field);
      if (!f || f === '[)>' || f === '06' || f === '>') return;
      if      (f.startsWith('30P')) result.quantity        = parseInt(f.slice(3))  || 0;
      else if (f.startsWith('1P'))  result.manufacturer_pn = f.slice(2);
      else if (f.startsWith('1V'))  result.manufacturer    = f.slice(2);
      else if (f.startsWith('4L'))  { if (!result.manufacturer) result.manufacturer = f.slice(2); }
      else if (f.startsWith('K'))   result.digikey_pn      = f.slice(1);
      else if (f.startsWith('P'))   { if (!result.digikey_pn) result.digikey_pn = f.slice(1); }
    });
  } else {
    result.digikey_pn = raw.trim();
  }
  return result;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function setHTML(html) { document.getElementById('app').innerHTML = html; }
function escapeHtml(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Views ─────────────────────────────────────────────────────────────────────
function renderAuth(isRegister) {
  const title   = isRegister ? 'Create account' : 'Sign in';
  const btnText = isRegister ? 'Register' : 'Sign in';
  const toggle  = isRegister
    ? `<p class="text-center text-sm text-gray-500 mt-4">Already have an account? <a href="#" id="toggle-auth" class="text-blue-600 font-medium">Sign in</a></p>`
    : (!S.hasUsers ? `<p class="text-center text-sm text-gray-500 mt-4">No account yet? <a href="#" id="toggle-auth" class="text-blue-600 font-medium">Register</a></p>` : '');

  setHTML(`
    <div class="min-h-screen flex flex-col items-center justify-center px-4 bg-gradient-to-b from-blue-600 to-blue-800">
      <div class="w-full max-w-sm">
        <div class="text-center mb-8">
          <div class="text-4xl mb-2">📦</div>
          <h1 class="text-2xl font-bold text-white">inv2digikey</h1>
          <p class="text-blue-200 text-sm mt-1">Electronic parts inventory</p>
        </div>
        <div class="bg-white rounded-2xl shadow-xl p-6">
          <h2 class="text-lg font-semibold text-gray-800 mb-4">${title}</h2>
          <div id="auth-error" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg px-3 py-2 text-sm mb-3"></div>
          <form id="auth-form" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
              <input id="username" type="text" autocomplete="username" autocapitalize="none"
                class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-gray-900 bg-white" required>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
              <input id="password" type="password" autocomplete="${isRegister ? 'new-password' : 'current-password'}"
                class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-gray-900 bg-white" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition-colors">
              ${btnText}
            </button>
          </form>
          ${toggle}
        </div>
      </div>
    </div>
  `);

  document.getElementById('auth-form').onsubmit = async e => {
    e.preventDefault();
    const errEl = document.getElementById('auth-error');
    errEl.classList.add('hidden');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    try {
      const data = await api('POST', isRegister ? '/api/auth/register' : '/api/auth/login', { username, password });
      S.token = data.access_token;
      localStorage.setItem('inv_token', S.token);
      S.view = 'inventory';
      await loadComponents();
      render();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove('hidden');
    }
  };

  document.getElementById('toggle-auth')?.addEventListener('click', e => {
    e.preventDefault();
    S.view = isRegister ? 'login' : 'register';
    render();
  });
}

function renderInventory() {
  const filtered = S.components.filter(c => {
    if (!S.search) return true;
    const q = S.search.toLowerCase();
    return (c.digikey_pn||'').toLowerCase().includes(q)
      || (c.manufacturer_pn||'').toLowerCase().includes(q)
      || (c.description||'').toLowerCase().includes(q)
      || (c.manufacturer||'').toLowerCase().includes(q);
  });

  setHTML(`
    <div class="min-h-screen flex flex-col">
      <header class="bg-blue-600 text-white px-4 pt-safe pb-3 shadow-md sticky top-0 z-10">
        <div class="flex items-center justify-between mb-2">
          <h1 class="text-lg font-bold">📦 inv2digikey</h1>
          <div class="flex items-center gap-3">
            <span class="text-blue-200 text-sm">${S.components.length} parts</span>
            <button id="btn-logout" class="text-blue-200 hover:text-white text-sm">Logout</button>
          </div>
        </div>
        <input id="search-input" type="search" placeholder="Search parts…" value="${escapeHtml(S.search)}"
          class="w-full bg-blue-500 placeholder-blue-300 text-white border border-blue-400 rounded-lg px-3 py-2 text-sm">
      </header>

      <main class="flex-1 overflow-y-auto px-3 py-3 pb-24 space-y-2 fade-in">
        ${filtered.length === 0 ? `
          <div class="text-center text-gray-400 mt-16">
            <div class="text-5xl mb-3">🔍</div>
            <p class="font-medium">${S.search ? 'No results found' : 'No components yet'}</p>
            <p class="text-sm mt-1">${S.search ? 'Try a different search' : 'Tap Scan or + to add your first part'}</p>
          </div>
        ` : filtered.map(componentCard).join('')}
      </main>

      <nav class="fixed bottom-0 inset-x-0 bg-white border-t border-gray-200 flex items-center justify-around px-2 pb-safe z-20" style="height:64px">
        <button id="btn-nav-list" class="flex flex-col items-center gap-0.5 text-blue-600 font-medium text-xs py-2 px-4">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
          Inventory
        </button>
        <button id="btn-nav-scan" class="bg-blue-600 text-white rounded-full w-14 h-14 flex items-center justify-center shadow-lg -mt-6 text-2xl">📷</button>
        <button id="btn-nav-add" class="flex flex-col items-center gap-0.5 text-gray-500 text-xs py-2 px-4">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Add
        </button>
      </nav>
    </div>
  `);

  document.getElementById('search-input').oninput = e => { S.search = e.target.value; renderInventory(); };
  document.getElementById('btn-logout').onclick = () => { S.token = ''; localStorage.removeItem('inv_token'); S.view = 'login'; render(); };
  document.getElementById('btn-nav-scan').onclick = () => { S.view = 'scan'; render(); };
  document.getElementById('btn-nav-add').onclick  = () => { S.current = null; S.view = 'form'; render(); };
  document.getElementById('btn-nav-list').onclick = () => { S.view = 'inventory'; render(); };

  document.querySelectorAll('.component-card').forEach(el => {
    el.onclick = () => {
      S.current = S.components.find(c => c.id === parseInt(el.dataset.id));
      S.view = 'detail';
      render();
    };
  });
}

function componentCard(c) {
  const qty = c.quantity ?? 0;
  const qtyColor = qty === 0 ? 'text-red-500' : qty < 5 ? 'text-orange-500' : 'text-green-600';
  return `
    <div class="component-card card bg-white rounded-xl shadow-sm border border-gray-100 p-3 cursor-pointer active:bg-gray-50" data-id="${c.id}">
      <div class="flex items-start justify-between gap-2">
        <div class="flex-1 min-w-0">
          <p class="font-semibold text-gray-900 text-sm truncate">${escapeHtml(c.digikey_pn || c.manufacturer_pn || '(no part number)')}</p>
          ${c.manufacturer_pn && c.digikey_pn ? `<p class="text-xs text-blue-600 truncate">${escapeHtml(c.manufacturer_pn)}</p>` : ''}
          ${c.description ? `<p class="text-xs text-gray-500 mt-0.5 line-clamp-1">${escapeHtml(c.description)}</p>` : ''}
        </div>
        <div class="text-right shrink-0">
          <span class="text-lg font-bold ${qtyColor}">${qty}</span>
          <p class="text-xs text-gray-400">pcs</p>
        </div>
      </div>
      ${c.manufacturer || c.location ? `
        <div class="flex gap-2 mt-1.5 flex-wrap">
          ${c.manufacturer ? `<span class="text-xs bg-gray-100 text-gray-600 rounded px-1.5 py-0.5">${escapeHtml(c.manufacturer)}</span>` : ''}
          ${c.location ? `<span class="text-xs bg-blue-50 text-blue-600 rounded px-1.5 py-0.5">📍 ${escapeHtml(c.location)}</span>` : ''}
        </div>
      ` : ''}
    </div>
  `;
}

// ── Scanner view ──────────────────────────────────────────────────────────────
function renderScanner() {
  setHTML(`
    <div class="min-h-screen flex flex-col bg-gray-900">
      <header class="flex items-center px-4 py-3 bg-gray-900">
        <button id="btn-back" class="text-white mr-3 text-lg">←</button>
        <h2 class="text-white font-semibold text-lg flex-1">Scan barcode / QR</h2>
      </header>

      <div class="px-4 relative">
        <div id="reader" class="relative rounded-xl overflow-hidden bg-black" style="min-height:280px">
          <!-- video inserted by startScanner() -->
          <div id="scan-corners" class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div class="relative" style="width:260px;height:260px">
              <div class="absolute top-0 left-0 w-10 h-10 border-t-4 border-l-4 border-white opacity-80 rounded-tl-lg"></div>
              <div class="absolute top-0 right-0 w-10 h-10 border-t-4 border-r-4 border-white opacity-80 rounded-tr-lg"></div>
              <div class="absolute bottom-0 left-0 w-10 h-10 border-b-4 border-l-4 border-white opacity-80 rounded-bl-lg"></div>
              <div class="absolute bottom-0 right-0 w-10 h-10 border-b-4 border-r-4 border-white opacity-80 rounded-br-lg"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="px-4 py-3 text-center">
        <p class="text-gray-400 text-sm">Point your camera at a barcode or QR code</p>
        <p class="text-gray-500 text-xs mt-1">DigiKey Data Matrix, QR codes, Code 128 supported</p>
      </div>

      <div id="scan-result" class="hidden mx-4 bg-white rounded-xl p-4 fade-in">
        <h3 class="font-semibold text-gray-800 mb-3 flex items-center gap-2">
          <span class="text-green-500">✓</span> Scanned
        </h3>
        <div id="scan-fields" class="space-y-1 text-sm mb-4"></div>
        <div class="flex gap-2">
          <button id="btn-scan-save" class="flex-1 bg-blue-600 text-white rounded-lg py-2.5 font-semibold">Save</button>
          <button id="btn-scan-edit" class="flex-1 border border-blue-600 text-blue-600 rounded-lg py-2.5 font-semibold">Edit first</button>
          <button id="btn-scan-retry" class="px-4 border border-gray-300 text-gray-600 rounded-lg py-2.5">Retry</button>
        </div>
      </div>
    </div>
  `);

  document.getElementById('btn-back').onclick = () => { stopScanner(); S.view = 'inventory'; render(); };
  startScanner();
}

// ── Scanner engine (ZXing WASM via manual camera loop) ────────────────────────
async function startScanner() {
  if (S.scannerRunning) return;

  const readerEl = document.getElementById('reader');
  if (!readerEl) return;

  const video = document.createElement('video');
  video.id = 'scanner-video';
  video.setAttribute('autoplay', '');
  video.setAttribute('playsinline', '');
  video.setAttribute('muted', '');
  readerEl.insertBefore(video, readerEl.firstChild);

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
    });
    video.srcObject = stream;
    S.scannerStream = stream;
    await video.play();
    S.scannerRunning = true;
    scheduleFrame(video);
  } catch (err) {
    console.error('Camera error:', err);
    readerEl.innerHTML = `<p class="text-red-400 text-center py-10 text-sm px-4">Camera error: ${err.message}.<br>Allow camera access and try again.</p>`;
  }
}

function scheduleFrame(video) {
  if (!S.scannerRunning) return;
  S.scannerTimer = setTimeout(() => decodeFrame(video), 150);
}

async function decodeFrame(video) {
  if (!S.scannerRunning) return;
  if (video.readyState < video.HAVE_ENOUGH_DATA) { scheduleFrame(video); return; }

  try {
    const detector = await getDetector();
    const barcodes = await detector.detect(video);
    if (barcodes.length > 0 && S.scannerRunning) {
      onScanSuccess(barcodes[0].rawValue);
      return;
    }
  } catch (_) { /* ignore decode errors, keep scanning */ }

  scheduleFrame(video);
}

function stopScanner() {
  S.scannerRunning = false;
  clearTimeout(S.scannerTimer);
  S.scannerTimer = null;
  if (S.scannerStream) {
    S.scannerStream.getTracks().forEach(t => t.stop());
    S.scannerStream = null;
  }
}

function onScanSuccess(decodedText) {
  // Pause scanning while user reviews result
  S.scannerRunning = false;
  clearTimeout(S.scannerTimer);

  const parsed = parseBarcode(decodedText);
  S.scanned = parsed;

  const resultEl = document.getElementById('scan-result');
  const fieldsEl = document.getElementById('scan-fields');
  if (!resultEl || !fieldsEl) return;

  const rows = [
    ['DigiKey PN',   parsed.digikey_pn],
    ['Mfr PN',       parsed.manufacturer_pn],
    ['Manufacturer', parsed.manufacturer],
    ['Description',  parsed.description],
    ['Qty',          parsed.quantity || ''],
  ].filter(([, v]) => v);

  fieldsEl.innerHTML = rows.map(([label, v]) =>
    `<div class="flex gap-2"><span class="text-gray-500 w-24 shrink-0">${label}:</span><span class="font-medium text-gray-900 break-all">${escapeHtml(String(v))}</span></div>`
  ).join('');

  resultEl.classList.remove('hidden');

  document.getElementById('btn-scan-save').onclick = async () => {
    try {
      await api('POST', '/api/components', S.scanned);
      await loadComponents();
      stopScanner();
      S.view = 'inventory';
      render();
    } catch (err) { alert(err.message); }
  };

  document.getElementById('btn-scan-edit').onclick = () => {
    S.current = { ...S.scanned, id: null };
    stopScanner();
    S.view = 'form';
    render();
  };

  document.getElementById('btn-scan-retry').onclick = () => {
    resultEl.classList.add('hidden');
    // Resume scanning on the existing video element
    const video = document.getElementById('scanner-video');
    if (video) { S.scannerRunning = true; scheduleFrame(video); }
  };
}

// ── Form views ────────────────────────────────────────────────────────────────
function renderForm(component) {
  const isEdit = component && component.id;
  const c = component || {};

  setHTML(`
    <div class="min-h-screen flex flex-col">
      <header class="bg-blue-600 text-white px-4 py-3 flex items-center sticky top-0 z-10">
        <button id="btn-back" class="mr-3 text-xl">←</button>
        <h2 class="font-semibold text-lg flex-1">${isEdit ? 'Edit component' : 'Add component'}</h2>
        ${isEdit ? `<button id="btn-delete" class="text-red-200 text-sm">Delete</button>` : ''}
      </header>

      <form id="component-form" class="flex-1 overflow-y-auto px-4 py-4 pb-24 space-y-4 fade-in">
        ${formField('digikey_pn',     'DigiKey Part Number',     c.digikey_pn,     'text',   'e.g. RHM33.0AFCT-ND')}
        ${formField('manufacturer_pn','Manufacturer Part Number', c.manufacturer_pn,'text',   'e.g. ESR18EZPF33R0')}
        ${formField('manufacturer',   'Manufacturer',             c.manufacturer,   'text',   'e.g. ROHM Semiconductor')}
        ${formField('description',    'Description',              c.description,    'text',   'e.g. RES SMD 33 OHM 1% 1206')}
        ${formField('quantity',       'Quantity',                 c.quantity ?? 0,  'number', '0')}
        ${formField('location',       'Location / Bin',           c.location,       'text',   'e.g. Drawer A3')}
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
          <textarea id="field-notes" rows="3" placeholder="Optional notes"
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-gray-900 bg-white text-sm">${escapeHtml(c.notes || '')}</textarea>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-xl text-base shadow-sm">
          ${isEdit ? 'Save changes' : 'Add to inventory'}
        </button>
      </form>
    </div>
  `);

  document.getElementById('btn-back').onclick = () => { S.view = isEdit ? 'detail' : 'inventory'; render(); };

  document.getElementById('btn-delete')?.addEventListener('click', async () => {
    if (!confirm('Delete this component?')) return;
    try { await api('DELETE', `/api/components/${component.id}`); await loadComponents(); S.view = 'inventory'; render(); }
    catch (err) { alert(err.message); }
  });

  document.getElementById('component-form').onsubmit = async e => {
    e.preventDefault();
    const payload = {
      digikey_pn:      val('digikey_pn'),
      manufacturer_pn: val('manufacturer_pn'),
      manufacturer:    val('manufacturer'),
      description:     val('description'),
      quantity:        parseInt(val('quantity')) || 0,
      location:        val('location'),
      notes:           val('notes'),
      raw_barcode:     c.raw_barcode || null,
    };
    try {
      if (isEdit) await api('PUT', `/api/components/${component.id}`, payload);
      else        await api('POST', '/api/components', payload);
      await loadComponents();
      S.view = 'inventory';
      render();
    } catch (err) { alert(err.message); }
  };
}

function formField(id, label, value, type, placeholder) {
  return `
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">${label}</label>
      <input id="field-${id}" type="${type}" value="${escapeHtml(String(value ?? ''))}" placeholder="${placeholder}"
        class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-gray-900 bg-white text-sm">
    </div>
  `;
}

function val(id) { const el = document.getElementById(`field-${id}`); return el ? el.value.trim() : ''; }

function renderDetail(c) {
  if (!c) { S.view = 'inventory'; render(); return; }
  const qty = c.quantity ?? 0;
  const qtyColor = qty === 0 ? 'bg-red-100 text-red-700' : qty < 5 ? 'bg-orange-100 text-orange-700' : 'bg-green-100 text-green-700';
  const rows = [
    ['DigiKey PN', c.digikey_pn], ['Mfr PN', c.manufacturer_pn], ['Manufacturer', c.manufacturer],
    ['Description', c.description], ['Location', c.location], ['Notes', c.notes],
  ].filter(([, v]) => v);
  const dkUrl = c.digikey_pn ? `https://www.digikey.com/en/products/result?keywords=${encodeURIComponent(c.digikey_pn)}` : null;

  setHTML(`
    <div class="min-h-screen flex flex-col">
      <header class="bg-blue-600 text-white px-4 py-3 flex items-center sticky top-0 z-10">
        <button id="btn-back" class="mr-3 text-xl">←</button>
        <h2 class="font-semibold text-lg flex-1 truncate">${escapeHtml(c.digikey_pn || c.manufacturer_pn || 'Component')}</h2>
        <button id="btn-edit" class="text-blue-200 text-sm font-medium">Edit</button>
      </header>

      <div class="flex-1 overflow-y-auto px-4 py-4 pb-24 space-y-3 fade-in">
        <div class="flex items-center justify-between bg-white rounded-xl p-4 shadow-sm border border-gray-100">
          <span class="text-gray-600 font-medium">Quantity</span>
          <span class="text-3xl font-bold ${qtyColor} rounded-full px-4 py-1">${qty}</span>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          ${rows.map(([label, v], i) => `
            <div class="flex gap-3 px-4 py-3 ${i < rows.length - 1 ? 'border-b border-gray-100' : ''}">
              <span class="text-gray-500 text-sm w-28 shrink-0 pt-0.5">${label}</span>
              <span class="text-gray-900 text-sm font-medium break-all">${escapeHtml(v)}</span>
            </div>
          `).join('')}
        </div>
        ${dkUrl ? `
          <a href="${dkUrl}" target="_blank" rel="noopener"
            class="flex items-center justify-center gap-2 bg-blue-600 text-white rounded-xl py-3 font-semibold shadow-sm">
            🔗 Search on DigiKey
          </a>
        ` : ''}
        <p class="text-center text-xs text-gray-400">Added ${new Date(c.created_at).toLocaleDateString()}</p>
      </div>
    </div>
  `);

  document.getElementById('btn-back').onclick = () => { S.view = 'inventory'; render(); };
  document.getElementById('btn-edit').onclick  = () => { S.current = c; S.view = 'form'; render(); };
}

// ── Data loading ──────────────────────────────────────────────────────────────
async function loadComponents() {
  try {
    S.components = await api('GET', `/api/components${S.search ? `?search=${encodeURIComponent(S.search)}` : ''}`);
  } catch { S.components = []; }
}

async function checkAuthStatus() {
  try { const d = await api('GET', '/api/auth/status'); S.hasUsers = d.has_users; }
  catch { S.hasUsers = false; }
}

// ── Router ────────────────────────────────────────────────────────────────────
async function render() {
  if (S.view !== 'scan' && S.scannerRunning) stopScanner();

  if (!S.token) { renderAuth(S.view === 'register' || !S.hasUsers); return; }

  switch (S.view) {
    case 'inventory': renderInventory(); break;
    case 'scan':      renderScanner();   break;
    case 'form':      renderForm(S.current); break;
    case 'detail':    renderDetail(S.current); break;
    default:          renderInventory();
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
await checkAuthStatus();
if (S.token) {
  try { await loadComponents(); S.view = 'inventory'; }
  catch { S.token = ''; localStorage.removeItem('inv_token'); S.view = S.hasUsers ? 'login' : 'register'; }
} else {
  S.view = S.hasUsers ? 'login' : 'register';
}
render();
</script>
</body>
</html>
