# Dependency Review — fails a PR that introduces known-vulnerable or
# disallowed-license dependencies.
# Docs: https://docs.github.com/en/code-security/supply-chain-security/understanding-your-software-supply-chain/about-dependency-review
#
# Requires the repo to have GitHub's Dependency Graph enabled (on by default
# for public repos; private repos must enable GHAS or Dependabot).
name: Dependency Review

on:
  pull_request:

permissions: read-all

concurrency:
  group: dep-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Review new dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write # for the inline PR summary comment

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.5.0
        with:
          # Block anything moderate or worse. Tune to 'low' for strict repos.
          fail-on-severity: high
          # Copyleft licenses are blocked by default. Users should tailor this
          # to their organisation's legal policy.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
          comment-summary-in-pr: on-failure
