technical_notes: |
  Backend is FastAPI; CSV is built with the stdlib csv module and returned via a
  Response with a Content-Disposition attachment header. User-maintenance
  endpoints reuse the existing JWT auth dependency — any authenticated user may
  manage users (single shared operator model). Frontend is the single-page
  static/index.html (vanilla JS + Tailwind via CDN); dark mode is implemented
  with a body.dark class plus scoped CSS overrides for the Tailwind utility
  classes in use, avoiding a rewrite of every template string.

